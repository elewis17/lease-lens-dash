name: Dispatch Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lease-lens-dash
        uses: actions/checkout@v4

      - name: Checkout AI Company OS
        uses: actions/checkout@v4
        with:
          repository: elewis17/ai-company-os
          path: ai-company-os

      - name: Extract issue image URLs
        shell: bash
        run: |
          mkdir -p agent/images
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          body = os.environ.get("ISSUE_BODY", "") or ""
          urls = re.findall(r'https://github\.com/user-attachments/assets/[^\s)>\]"]+', body)

          out = Path("agent/image-urls.txt")
          out.write_text("\n".join(urls), encoding="utf-8")

          print(f"Found {len(urls)} image URL(s)")
          PY
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Download issue images
        shell: bash
        run: |
          mkdir -p agent/images

          if [ ! -f agent/image-urls.txt ] || [ ! -s agent/image-urls.txt ]; then
            echo "No image URLs found"
            exit 0
          fi

          count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count+1))
            out="agent/images/issue-image-$count.png"

            echo "Downloading: $url"
            curl -L --fail --show-error --silent "$url" -o "$out"

            if [ ! -s "$out" ]; then
              echo "Download failed or file is empty: $out"
              exit 1
            fi

            echo "Saved: $out"
            ls -lh "$out"
          done < agent/image-urls.txt

          echo "Final image folder contents:"
          ls -R agent/images
          
      - name: Build task packet
        run: |
          mkdir -p agent

          {
            echo "# Task Packet"
            echo
            echo "Issue: #${{ github.event.issue.number }}"
            echo "Title: ${{ github.event.issue.title }}"
            echo
            echo "Description:"
            echo "${{ github.event.issue.body }}"
            echo
            echo "---"
            echo
            echo "# OS Context"
          } > agent/task.md

      - name: Append OS context files
        run: |
          for file in \
            ai-company-os/agents/software_engineer.md \
            ai-company-os/agents/qa_analyst.md \
            ai-company-os/architecture/system_architecture.md \
            ai-company-os/architecture/repo_structure.md \
            ai-company-os/architecture/coding_standards.md \
            ai-company-os/architecture/security_principles.md \
            ai-company-os/workflows/feature_development.md \
            ai-company-os/workflows/handoff_standard.md
          do
            if [ -f "$file" ]; then
              {
                echo
                echo "---"
                echo
                echo "FILE: $file"
                echo
                cat "$file"
              } >> agent/task.md
            fi
          done

      - name: Upload task packet
        uses: actions/upload-artifact@v4
        with:
          name: task-packet
          path: |
            agent/task.md
            agent/image-urls.txt
            agent/images/

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Dispatcher ran successfully and created a task packet with OS context."
            })
