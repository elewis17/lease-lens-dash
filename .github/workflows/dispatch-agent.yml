name: Dispatch Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lease-lens-dash
        uses: actions/checkout@v4

      - name: Checkout AI Company OS
        uses: actions/checkout@v4
        with:
          repository: elewis17/ai-company-os
          path: ai-company-os

      - name: Build task packet
        run: |
          mkdir -p agent

          echo "# Task Packet" > agent/task.md
          echo "" >> agent/task.md
          echo "Issue: #${{ github.event.issue.number }}" >> agent/task.md
          echo "Title: ${{ github.event.issue.title }}" >> agent/task.md
          echo "" >> agent/task.md
          echo "Description:" >> agent/task.md
          echo "${{ github.event.issue.body }}" >> agent/task.md

      - name: Upload task packet
        uses: actions/upload-artifact@v4
        with:
          name: task-packet
          path: agent/task.md

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Dispatcher ran successfully and created a task packet."
            })
