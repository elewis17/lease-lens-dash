name: Dispatch Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lease-lens-dash
        uses: actions/checkout@v4

      - name: Checkout AI Company OS
        uses: actions/checkout@v4
        with:
          repository: elewis17/ai-company-os
          path: ai-company-os

      - name: Build task packet
        run: |
          mkdir -p agent

          {
            echo "# Task Packet"
            echo
            echo "Issue: #${{ github.event.issue.number }}"
            echo "Title: ${{ github.event.issue.title }}"
            echo
            echo "Description:"
            echo "${{ github.event.issue.body }}"
            echo
            echo "---"
            echo
            echo "# OS Context"
          } > agent/task.md

      - name: Append OS context files
        run: |
          for file in \
            ai-company-os/agents/software_engineer.md \
            ai-company-os/agents/qa_analyst.md \
            ai-company-os/architecture/system_architecture.md \
            ai-company-os/architecture/repo_structure.md \
            ai-company-os/architecture/coding_standards.md \
            ai-company-os/architecture/security_principles.md \
            ai-company-os/workflows/feature_development.md \
            ai-company-os/workflows/handoff_standard.md
          do
            if [ -f "$file" ]; then
              {
                echo
                echo "---"
                echo
                echo "FILE: $file"
                echo
                cat "$file"
              } >> agent/task.md
            fi
          done

      - name: Upload task packet
        uses: actions/upload-artifact@v4
        with:
          name: task-packet
          path: agent/task.md

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Dispatcher ran successfully and created a task packet with OS context."
            })
