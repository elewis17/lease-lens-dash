name: Dispatch Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lease-lens-dash
        uses: actions/checkout@v4

      - name: Checkout AI Company OS
        uses: actions/checkout@v4
        with:
          repository: elewis17/ai-company-os
          path: ai-company-os

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install retrieval dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai numpy

      - name: Extract issue image URLs
        shell: bash
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p agent/images
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          body = os.environ.get("ISSUE_BODY", "") or ""
          urls = re.findall(
              r'https://(?:github\.com/user-attachments/assets|user-images\.githubusercontent\.com)/[^\s)>\]"]+',
              body
          )

          out = Path("agent/image-urls.txt")
          out.write_text("\n".join(urls), encoding="utf-8")

          print(f"Found {len(urls)} image URL(s)")
          PY

      - name: Download issue images
        shell: bash
        run: |
          mkdir -p agent/images

          if [ ! -f agent/image-urls.txt ] || [ ! -s agent/image-urls.txt ]; then
            echo "No image URLs found"
            exit 0
          fi

          count=0
          while IFS= read -r url || [ -n "$url" ]; do
            [ -z "$url" ] && continue
            count=$((count+1))
            out="agent/images/issue-image-$count.png"

            echo "Downloading: $url"
            curl -L --fail --show-error --silent "$url" -o "$out"

            if [ ! -s "$out" ]; then
              echo "Download failed or file is empty: $out"
              exit 1
            fi

            echo "Saved: $out"
            ls -lh "$out"
          done < agent/image-urls.txt

          echo "Final image folder contents:"
          ls -R agent/images

      - name: Run retrieval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_QUERY: ${{ github.event.issue.title }} ${{ github.event.issue.body }}
        run: |
          mkdir -p agent
          python ai-company-os/runtime/indexer/retrieve.py "$ISSUE_QUERY"
          cp ai-company-os/runtime/indexer/retrieved_paths.json agent/retrieved_paths.json

      - name: Build task packet
        run: |
          mkdir -p agent

          {
            echo "# Task Packet"
            echo
            echo "Issue: #${{ github.event.issue.number }}"
            echo "Title: ${{ github.event.issue.title }}"
            echo
            echo "Description:"
            echo "${{ github.event.issue.body }}"
            echo
            echo "---"
            echo
            echo "# Retrieved OS Context"
          } > agent/task.md

      - name: Append retrieved OS context files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          retrieved = Path("agent/retrieved_paths.json")
          task = Path("agent/task.md")
          os_root = Path("ai-company-os")

          if not retrieved.exists():
              raise FileNotFoundError("agent/retrieved_paths.json not found")

          results = json.loads(retrieved.read_text(encoding="utf-8"))

          with task.open("a", encoding="utf-8") as f:
              for item in results:
                  rel_path = item.get("path", "").strip()
                  if not rel_path:
                      continue

                  full_path = os_root / rel_path

                  f.write("\n---\n\n")
                  f.write(f"FILE: {rel_path}\n")
                  f.write(f"PURPOSE: {item.get('purpose', '')}\n")
                  f.write(f"SUMMARY: {item.get('summary', '')}\n\n")

                  if full_path.exists():
                      f.write(full_path.read_text(encoding="utf-8", errors="ignore"))
                  else:
                      f.write("[File not found]\n")
          PY

      - name: Upload task packet
        uses: actions/upload-artifact@v4
        with:
          name: task-packet
          path: |
            agent/task.md
            agent/image-urls.txt
            agent/images/
            agent/retrieved_paths.json

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Dispatcher ran successfully and created a task packet with retrieved OS context."
            })
