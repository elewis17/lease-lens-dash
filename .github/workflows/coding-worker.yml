name: Coding Worker

on:
  workflow_run:
    workflows: ["Dispatch Agent"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  worker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lease-lens repo
        uses: actions/checkout@v4

      - name: Checkout AI Company OS
        uses: actions/checkout@v4
        with:
          repository: elewis17/ai-company-os
          path: ai-company-os

      - name: Download task packet
        uses: actions/download-artifact@v4
        with:
          name: task-packet
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: task

      - name: Show task
        run: |
          echo "---- TASK PACKET ----"
          cat task/task.md

      - name: Parse issue metadata
        id: issue
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path('task/issue_metadata.json').read_text(encoding='utf-8'))
          issue_number = str(metadata.get('issue_number', '')).strip()
          issue_title = str(metadata.get('issue_title', '')).strip()

          def slugify(value: str) -> str:
              cleaned = ''.join(ch.lower() if ch.isalnum() else '-' for ch in value)
              while '--' in cleaned:
                  cleaned = cleaned.replace('--', '-')
              return cleaned.strip('-')[:40] or 'agent-change'

          branch = f"agent/issue-{issue_number}-{slugify(issue_title)}"
          pr_title = f"agent: {issue_title}"

          output = Path('issue_outputs.txt')
          output.write_text(
              f"issue_number={issue_number}\nbranch_name={branch}\npr_title={pr_title}\n",
              encoding='utf-8'
          )
          PY

          cat issue_outputs.txt >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai numpy pyyaml

      - name: Reset runtime runs
        run: |
          rm -rf runtime/runs
          rm -rf ai-company-os/runtime/runs
          mkdir -p runtime/runs
          mkdir -p ai-company-os/runtime/runs

      - name: Run AI Company OS coding workflow against Lease Lens
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LEASE_LENS_REPO_ROOT: ${{ github.workspace }}
        run: |
          python ai-company-os/scripts/run_task_packet.py task

      - name: Upload runtime runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-runtime-runs
          path: |
            runtime/runs
            ai-company-os/runtime/runs
          if-no-files-found: warn

      - name: Debug workflow outputs
        if: always()
        shell: bash
        run: |
          echo "---- pwd ----"
          pwd
          echo
          echo "---- git status ----"
          git status --short
          echo
          echo "---- root runtime/runs ----"
          find runtime/runs -maxdepth 2 -type f 2>/dev/null || true
          echo
          echo "---- ai-company-os/runtime/runs ----"
          find ai-company-os/runtime/runs -maxdepth 2 -type f 2>/dev/null || true
          echo
          echo "---- latest software engineer step (root) ----"
          latest_root=$(find runtime/runs -maxdepth 1 -name 'step_*_software_engineer.json' | sort | tail -n 1)
          if [ -n "$latest_root" ]; then
            cat "$latest_root"
          else
            echo "No software engineer step file found in root runtime/runs"
          fi
          echo
          echo "---- latest software engineer step (ai-company-os) ----"
          latest_repo=$(find ai-company-os/runtime/runs -maxdepth 1 -name 'step_*_software_engineer.json' | sort | tail -n 1)
          if [ -n "$latest_repo" ]; then
            cat "$latest_repo"
          else
            echo "No software engineer step file found in ai-company-os/runtime/runs"
          fi

      - name: Check for repository changes
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ steps.issue.outputs.pr_title }}
          branch: ${{ steps.issue.outputs.branch_name }}
          title: ${{ steps.issue.outputs.pr_title }}
          body: |
            Automated change generated by AI Company OS coding worker.

            Trigger:
            - Issue #${{ steps.issue.outputs.issue_number }}

            Validation run in workflow:
            - AI Company OS workflow execution completed
            - Review the diff and run repo CI before merge
          base: main
          delete-branch: true

      - name: No-op summary
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No repository changes were produced by the coding workflow."