name: Coding Worker

on:
  workflow_run:
    workflows: ["Dispatch Agent"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  worker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lease-lens repo
        uses: actions/checkout@v4

      - name: Checkout AI Company OS
        uses: actions/checkout@v4
        with:
          repository: elewis17/ai-company-os
          path: ai-company-os

      - name: Download task packet
        uses: actions/download-artifact@v4
        with:
          name: task-packet
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: task

      - name: Show task
        run: |
          echo "---- TASK PACKET ----"
          cat task/task.md

      - name: Parse issue metadata
        id: issue
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path('task/issue_metadata.json').read_text(encoding='utf-8'))
          issue_number = str(metadata.get('issue_number', '')).strip()
          issue_title = str(metadata.get('issue_title', '')).strip()

          def slugify(value: str) -> str:
              cleaned = ''.join(ch.lower() if ch.isalnum() else '-' for ch in value)
              while '--' in cleaned:
                  cleaned = cleaned.replace('--', '-')
              return cleaned.strip('-')[:40] or 'agent-change'

          branch = f"agent/issue-{issue_number}-{slugify(issue_title)}"
          pr_title = f"agent: {issue_title}"

          output = Path('issue_outputs.txt')
          output.write_text(
              f"issue_number={issue_number}\nbranch_name={branch}\npr_title={pr_title}\n",
              encoding='utf-8'
          )
          PY

          cat issue_outputs.txt >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ FIXED STEP (added pyyaml)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai numpy pyyaml

      - name: Run AI Company OS coding workflow against Lease Lens
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LEASE_LENS_REPO_ROOT: ${{ github.workspace }}
        run: |
          python ai-company-os/scripts/run_task_packet.py task

      - name: Check for repository changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ steps.issue.outputs.pr_title }}
          branch: ${{ steps.issue.outputs.branch_name }}
          title: ${{ steps.issue.outputs.pr_title }}
          body: |
            Automated change generated by AI Company OS coding worker.

            Trigger:
            - Issue #${{ steps.issue.outputs.issue_number }}

            Validation run in workflow:
            - AI Company OS workflow execution completed
            - Review the diff and run repo CI before merge
          base: main
          delete-branch: true

      - name: No-op summary
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No repository changes were produced by the coding workflow."